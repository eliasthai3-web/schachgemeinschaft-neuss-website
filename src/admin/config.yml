backend:
  name: github
  repo: eliasthai3-web/schachgemeinschaft-neuss-website
  branch: main

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "aktuelles"
    label: "Aktuelles"
    label_singular: "Meldung"
    folder: "src/aktuelles"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - label: "Überschrift"
        name: "title"
        widget: "string"
      - label: "Datum"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
      - label: "Kurztext"
        name: "summary"
        widget: "text"
      - label: "Bild"
        name: "image"
        widget: "image"
        required: false
      - label: "Bildbeschreibung"
        name: "imageAlt"
        widget: "string"
        required: false
      - label: "Inhalt"
        name: "body"
        widget: "markdown"
